<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纸上滑雪的家庭食谱</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="recipe-styles.css">
    <style>
        /* 用户信息样式 */
        .main-nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .logout-btn {
            font-size: 12px;
            padding: 6px 12px;
        }

        .recipe-image {
            cursor: pointer;
            position: relative;
        }

        .recipe-image::after {
            content: '🔍 点击查看原图';
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .recipe-image:hover::after {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .main-nav {
                flex-wrap: wrap;
            }

            .user-info {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🚀 纸上滑雪的杂物间</h1>
            <p class="subtitle">高质量工具和软件下载平台</p>
            <nav class="main-nav">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="recipes.html" class="nav-link active">🍳 家庭食谱</a>
                <a href="nav.html" class="nav-link">🌐 网页导航</a>
                <div class="user-info" id="userInfo">
                    <!-- 登录后显示用户信息和退出按钮 -->
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="recipe-sub-nav">
            <a href="recipes.html" class="sub-nav-link active">📖 食谱列表</a>
            <a href="create-recipe.html" class="sub-nav-link">➕ 创建食谱</a>
            <a href="favorites.html" class="sub-nav-link">⭐ 我的收藏</a>
        </section>

        <section class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索食谱..." class="search-input">
                <button onclick="searchRecipes()" class="btn btn-primary">🔍 搜索</button>
            </div>
            <div class="filter-buttons" id="filterButtons">
                <button onclick="filterByCategory('all')" class="btn btn-secondary filter-btn active">全部</button>
                <span class="loading">加载分类中...</span>
            </div>
        </section>

        <section class="recipes-grid" id="recipesGrid">
            <div class="loading">加载中...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 纸上滑雪的家庭食谱. All rights reserved.</p>
        </div>
    </footer>

    <script src="recipe-api.js"></script>
    <script>
        let currentCategory = 'all';
        let currentSearch = '';

        // 检查登录状态
        function checkLogin() {
            const user = localStorage.getItem('recipe_user');
            if (!user) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        async function loadRecipes() {
            if (!checkLogin()) return;
            
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = '<div class="loading">加载中...</div>';

            try {
                let recipes = [];
                if (currentSearch) {
                    recipes = await searchRecipesAPI(currentSearch);
                } else if (currentCategory === 'all') {
                    recipes = await getAllRecipes();
                } else {
                    recipes = await getRecipesByCategory(currentCategory);
                }

                if (recipes.length === 0) {
                    grid.innerHTML = '<div class="empty-state">暂无食谱</div>';
                    return;
                }

                grid.innerHTML = recipes.map(recipe => `
                    <div class="recipe-card" onclick="viewRecipe(${recipe.id})">
                        <div class="recipe-image" onclick="event.stopPropagation(); viewOriginalImage('${recipe.original_image || recipe.cover_image}')">
                            ${recipe.cover_image ? 
                                `<img src="${recipe.cover_image}" alt="${recipe.title}" onerror="this.src='https://via.placeholder.com/400x300?text=暂无图片'">` :
                                `<div class="no-image">暂无图片</div>`
                            }
                            <div class="recipe-badge">${recipe.difficulty || '未知'}</div>
                        </div>
                        <div class="recipe-info">
                            <h3 class="recipe-title">${recipe.title}</h3>
                            <p class="recipe-description">${recipe.description || '暂无描述'}</p>
                            <div class="recipe-meta">
                                <span class="meta-item">⏱️ ${recipe.cooking_time || '未知'}分钟</span>
                                <span class="meta-item">👥 ${recipe.servings || '未知'}人份</span>
                                <span class="meta-item">📅 ${formatDate(recipe.created_at)}</span>
                            </div>
                            <div class="recipe-tags">
                                ${recipe.tags ? recipe.tags.split(',').map(tag => 
                                    `<span class="tag">${tag.trim()}</span>`
                                ).join('') : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载食谱失败:', error);
                grid.innerHTML = '<div class="error-state">加载失败，请重试</div>';
            }
        }

        function viewRecipe(id) {
            if (!checkLogin()) return;
            window.location.href = `recipe-detail.html?id=${id}`;
        }

        function viewOriginalImage(url) {
            if (!checkLogin()) return;
            if (url) {
                window.open(url, '_blank');
            }
        }

        function searchRecipes() {
            if (!checkLogin()) return;
            currentSearch = document.getElementById('searchInput').value;
            loadRecipes();
        }

        function filterByCategory(category) {
            if (!checkLogin()) return;
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadRecipes();
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('zh-CN');
        }

        // 显示用户信息
        function showUserInfo() {
            const userInfoElement = document.getElementById('userInfo');
            const user = localStorage.getItem('recipe_user');
            
            if (user) {
                const userObj = JSON.parse(user);
                userInfoElement.innerHTML = `
                    <span class="username">👤 ${userObj.username}</span>
                    <button onclick="logout()" class="btn btn-secondary logout-btn">🚪 退出</button>
                `;
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('recipe_user');
            localStorage.removeItem('recipe_token');
            window.location.href = 'login.html';
        }

        // 加载分类列表
        async function loadCategories() {
            try {
                const categories = await getCategories();
                const filterButtonsContainer = document.getElementById('filterButtons');
                
                // 移除加载中状态
                filterButtonsContainer.innerHTML = '<button onclick="filterByCategory(\'all\')" class="btn btn-secondary filter-btn active">全部</button>';
                
                // 添加分类按钮
                categories.forEach(category => {
                    const button = document.createElement('button');
                    button.className = 'btn btn-secondary filter-btn';
                    button.textContent = category.name;
                    button.onclick = function() {
                        filterByCategory(category.name);
                    };
                    filterButtonsContainer.appendChild(button);
                });
            } catch (error) {
                console.error('加载分类失败:', error);
                const filterButtonsContainer = document.getElementById('filterButtons');
                filterButtonsContainer.innerHTML = '<button onclick="filterByCategory(\'all\')" class="btn btn-secondary filter-btn active">全部</button><span class="error">加载分类失败</span>';
            }
        }

        // 页面加载时检查登录状态并加载食谱
        document.addEventListener('DOMContentLoaded', function() {
            if (checkLogin()) {
                showUserInfo();
                loadCategories();
                loadRecipes();
            }
        });
    </script>
</body>
</html>
