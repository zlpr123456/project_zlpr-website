<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食谱详情 - 纸上滑雪的家庭食谱</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="recipe-styles.css">
    <style>
        /* 用户信息样式 */
        .main-nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .logout-btn {
            font-size: 12px;
            padding: 6px 12px;
        }

        .recipe-cover {
            cursor: pointer;
            position: relative;
        }

        .recipe-cover::after {
            content: '🔍 点击查看原图';
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .recipe-cover:hover::after {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .main-nav {
                flex-wrap: wrap;
            }

            .user-info {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🚀 纸上滑雪的杂物间</h1>
            <p class="subtitle">高质量工具和软件下载平台</p>
            <nav class="main-nav">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="recipes.html" class="nav-link active">🍳 家庭食谱</a>
                <a href="nav.html" class="nav-link">🌐 网页导航</a>
                <div class="user-info" id="userInfo">
                    <!-- 登录后显示用户信息和退出按钮 -->
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="recipe-sub-nav">
            <a href="recipes.html" class="sub-nav-link">📖 食谱列表</a>
            <a href="create-recipe.html" class="sub-nav-link">➕ 创建食谱</a>
            <a href="favorites.html" class="sub-nav-link">⭐ 我的收藏</a>
        </section>

        <div id="recipeDetail">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 纸上滑雪的家庭食谱. All rights reserved.</p>
        </div>
    </footer>

    <script src="recipe-api.js"></script>
    <script>
        // 检查登录状态
        function checkLogin() {
            const user = localStorage.getItem('recipe_user');
            if (!user) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        async function loadRecipeDetail() {
            if (!checkLogin()) return;
            const params = new URLSearchParams(window.location.search);
            const recipeId = params.get('id');
            
            if (!recipeId) {
                window.location.href = 'recipes.html';
                return;
            }

            const container = document.getElementById('recipeDetail');
            
            try {
                const recipe = await getRecipeById(recipeId);
                const images = await getRecipeImages(recipeId);
                const isFavorite = await checkFavorite(recipeId);

                const coverImage = images.find(img => img.is_cover) || images[0];

                container.innerHTML = `
                    <div class="recipe-detail">
                        <div class="recipe-header">
                            <button onclick="window.location.href='recipes.html'" class="btn btn-secondary">← 返回列表</button>
                            <button onclick="toggleFavorite(${recipeId})" class="btn ${isFavorite ? 'btn-favorite-active' : 'btn-favorite'}">
                                ${isFavorite ? '⭐ 已收藏' : '☆ 收藏'}
                            </button>
                        </div>

                        <div class="recipe-cover" onclick="viewOriginalImage('${coverImage ? coverImage.r2_url : ''}')">
                            ${coverImage ? 
                                `<img src="${coverImage.thumbnail_url || coverImage.r2_url}" alt="${recipe.title}" class="cover-image">` :
                                `<div class="no-cover-image">暂无图片</div>`
                            }
                        </div>

                        <div class="recipe-content">
                            <h1 class="recipe-title">${recipe.title}</h1>
                            <p class="recipe-description">${recipe.description || '暂无描述'}</p>

                            <div class="recipe-meta-info">
                                <div class="meta-info-item">
                                    <span class="meta-icon">⏱️</span>
                                    <span class="meta-label">烹饪时间</span>
                                    <span class="meta-value">${recipe.cooking_time || '未知'}分钟</span>
                                </div>
                                <div class="meta-info-item">
                                    <span class="meta-icon">👥</span>
                                    <span class="meta-label">份量</span>
                                    <span class="meta-value">${recipe.servings || '未知'}人份</span>
                                </div>
                                <div class="meta-info-item">
                                    <span class="meta-icon">📊</span>
                                    <span class="meta-label">难度</span>
                                    <span class="meta-value">${recipe.difficulty || '未知'}</span>
                                </div>
                                <div class="meta-info-item">
                                    <span class="meta-icon">📂</span>
                                    <span class="meta-label">分类</span>
                                    <span class="meta-value">${recipe.category || '未分类'}</span>
                                </div>
                                <div class="meta-info-item">
                                    <span class="meta-icon">📅</span>
                                    <span class="meta-label">创建时间</span>
                                    <span class="meta-value">${formatDate(recipe.created_at)}</span>
                                </div>
                            </div>

                            <div class="recipe-tags">
                                ${recipe.tags ? recipe.tags.split(',').map(tag => 
                                    `<span class="tag">${tag.trim()}</span>`
                                ).join('') : ''}
                            </div>

                            <div class="recipe-section">
                                <h2>🥘 所需食材</h2>
                                <div class="ingredients-list">
                                    ${recipe.ingredients.split('\n').map(ingredient => 
                                        ingredient.trim() ? `<div class="ingredient-item">• ${ingredient}</div>` : ''
                                    ).join('')}
                                </div>
                            </div>

                            <div class="recipe-section">
                                <h2>📝 制作步骤</h2>
                                <div class="instructions-list">
                                    ${recipe.instructions.split('\n').map((instruction, index) => 
                                        instruction.trim() ? `
                                            <div class="instruction-item">
                                                <div class="instruction-number">${index + 1}</div>
                                                <div class="instruction-text">${instruction}</div>
                                            </div>
                                        ` : ''
                                    ).join('')}
                                </div>
                            </div>

                            ${images.length > 1 ? `
                                <div class="recipe-section">
                                    <h2>📷 更多图片</h2>
                                    <div class="recipe-images">
                                        ${images.map(img => `
                                            <img src="${img.thumbnail_url || img.r2_url}" alt="${recipe.title}" class="recipe-image-thumb" onclick="showImage('${img.r2_url}')">
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}

                            <div class="recipe-actions">
                                <button onclick="editRecipe(${recipe.id})" class="btn btn-primary">✏️ 编辑食谱</button>
                                <button onclick="deleteRecipe(${recipe.id})" class="btn btn-danger">🗑️ 删除食谱</button>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('加载食谱详情失败:', error);
                container.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
            }
        }

        async function toggleFavorite(recipeId) {
            if (!checkLogin()) return;
            
            try {
                const isFavorite = await checkFavorite(recipeId);
                if (isFavorite) {
                    await removeFavorite(recipeId);
                    alert('已取消收藏');
                } else {
                    await addFavorite(recipeId);
                    alert('已添加到收藏');
                }
                loadRecipeDetail();
            } catch (error) {
                console.error('收藏操作失败:', error);
                alert('操作失败，请重试');
            }
        }

        function editRecipe(id) {
            if (!checkLogin()) return;
            window.location.href = `create-recipe.html?id=${id}`;
        }

        async function deleteRecipe(id) {
            if (!checkLogin()) return;
            
            if (confirm('确定要删除这个食谱吗？此操作不可恢复。')) {
                try {
                    await deleteRecipeAPI(id);
                    alert('删除成功');
                    window.location.href = 'recipes.html';
                } catch (error) {
                    console.error('删除失败:', error);
                    alert('删除失败，请重试');
                }
            }
        }

        // 显示用户信息
        function showUserInfo() {
            const userInfoElement = document.getElementById('userInfo');
            const user = localStorage.getItem('recipe_user');
            
            if (user) {
                const userObj = JSON.parse(user);
                userInfoElement.innerHTML = `
                    <span class="username">👤 ${userObj.username}</span>
                    <button onclick="logout()" class="btn btn-secondary logout-btn">🚪 退出</button>
                `;
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('recipe_user');
            localStorage.removeItem('recipe_token');
            window.location.href = 'login.html';
        }

        function showImage(url) {
            window.open(url, '_blank');
        }

        function viewOriginalImage(url) {
            if (!checkLogin()) return;
            if (url) {
                window.open(url, '_blank');
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN');
        }

        // 页面加载时检查登录状态
        window.onload = function() {
            if (checkLogin()) {
                showUserInfo();
                loadRecipeDetail();
            }
        };
    </script>
</body>
</html>
