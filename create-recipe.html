<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建食谱 - 纸上滑雪的家庭食谱</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="recipe-styles.css">
    <style>
        /* 用户信息样式 */
        .main-nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .logout-btn {
            font-size: 12px;
            padding: 6px 12px;
        }

        @media (max-width: 768px) {
            .main-nav {
                flex-wrap: wrap;
            }

            .user-info {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🚀 纸上滑雪的杂物间</h1>
            <p class="subtitle">高质量工具和软件下载平台</p>
            <nav class="main-nav">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="recipes.html" class="nav-link">🍳 家庭食谱</a>
                <a href="nav.html" class="nav-link">🌐 网页导航</a>
                <div class="user-info" id="userInfo">
                    <!-- 登录后显示用户信息和退出按钮 -->
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="recipe-sub-nav">
            <a href="recipes.html" class="sub-nav-link">📖 食谱列表</a>
            <a href="create-recipe.html" class="sub-nav-link active">➕ 创建食谱</a>
            <a href="favorites.html" class="sub-nav-link">⭐ 我的收藏</a>
        </section>

        <div class="recipe-form-container">
            <h1 id="formTitle">创建新食谱</h1>
            
            <form id="recipeForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="recipeId" name="id">

                <div class="form-section">
                    <h2>基本信息</h2>
                    <div class="form-group">
                        <label for="title">食谱标题 *</label>
                        <input type="text" id="title" name="title" required placeholder="例如：红烧肉">
                    </div>

                    <div class="form-group">
                        <label for="description">描述</label>
                        <textarea id="description" name="description" rows="3" placeholder="简单描述这道菜..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cooking_time">烹饪时间（分钟）</label>
                            <input type="number" id="cooking_time" name="cooking_time" min="1" placeholder="例如：60">
                        </div>
                        <div class="form-group">
                            <label for="servings">份量（人份）</label>
                            <input type="number" id="servings" name="servings" min="1" placeholder="例如：4">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="difficulty">难度</label>
                            <select id="difficulty" name="difficulty">
                                <option value="简单">简单</option>
                                <option value="中等">中等</option>
                                <option value="困难">困难</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">分类</label>
                            <select id="category" name="category">
                                <option value="">加载中...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="tags">标签（用逗号分隔）</label>
                        <input type="text" id="tags" name="tags" placeholder="例如：猪肉,下饭菜,家常">
                    </div>
                </div>

                <div class="form-section">
                    <h2>所需食材</h2>
                    <div class="form-group">
                        <label for="ingredients">食材列表（每行一个）*</label>
                        <textarea id="ingredients" name="ingredients" rows="8" required placeholder="例如：&#10;五花肉 500g&#10;生抽 2勺&#10;老抽 1勺&#10;冰糖 30g"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h2>制作步骤</h2>
                    <div class="form-group">
                        <label for="instructions">制作步骤（每行一个步骤）*</label>
                        <textarea id="instructions" name="instructions" rows="10" required placeholder="例如：&#10;1. 五花肉切成2cm见方的块&#10;2. 冷水下锅焯水，捞出洗净&#10;3. 热锅冷油，下冰糖炒糖色&#10;4. 下肉块翻炒上色"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h2>上传图片</h2>
                    <div class="form-group">
                        <label for="images">选择图片（可多选）</label>
                        <input type="file" id="images" name="images" multiple accept="image/jpeg,image/png,image/gif,image/webp" onchange="handleImageSelect(event)">
                        <p class="form-hint">支持 JPG、PNG、GIF、WebP 格式，单个文件不超过5MB</p>
                    </div>

                    <div id="imagePreview" class="image-preview"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 保存食谱</button>
                    <button type="button" onclick="window.location.href='recipes.html'" class="btn btn-secondary">取消</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 纸上滑雪的家庭食谱. All rights reserved.</p>
        </div>
    </footer>

    <script src="recipe-api.js"></script>
    <script>
        // 直接定义全局函数，确保可用
        async function deleteRecipeImage(recipeId, imageId) {
            try {
                const formData = new FormData();
                formData.append('action', 'delete');
                formData.append('imageId', imageId);

                const response = await fetch(
                    `/api/recipes/${recipeId}/images`,
                    {
                        method: 'POST',
                        body: formData
                    }
                );

                if (!response.ok) {
                    throw new Error(`Delete failed: ${response.status}`);
                }
                
                return true; // 成功
            } catch (error) {
                console.error("Delete image error:", error);
                throw error; // 传递错误给调用者
            }
        }
        
        let selectedImages = [];
        let editingRecipeId = null;

        // 检查登录状态
        function checkLogin() {
            const user = localStorage.getItem('recipe_user');
            if (!user) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        async function generateThumbnail(file, maxWidth = 300, maxHeight = 300, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth || height > maxHeight) {
                        const ratio = Math.min(maxWidth / width, maxHeight / height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(new File([blob], `thumb_${file.name}`, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            }));
                        } else {
                            reject(new Error('Failed to generate thumbnail'));
                        }
                    }, 'image/jpeg', quality);
                };
                
                img.onerror = () => reject(new Error('Failed to load image'));
                img.src = URL.createObjectURL(file);
            });
        }

        async function loadRecipeForEdit() {
            if (!checkLogin()) return;
            
            const params = new URLSearchParams(window.location.search);
            const recipeId = params.get('id');
            
            if (recipeId) {
                editingRecipeId = recipeId;
                document.getElementById('formTitle').textContent = '编辑食谱';
                document.getElementById('recipeId').value = recipeId;

                try {
                    const recipe = await getRecipeById(recipeId);
                    document.getElementById('title').value = recipe.title;
                    document.getElementById('description').value = recipe.description || '';
                    document.getElementById('cooking_time').value = recipe.cooking_time || '';
                    document.getElementById('servings').value = recipe.servings || '';
                    document.getElementById('difficulty').value = recipe.difficulty;
                    document.getElementById('category').value = recipe.category || '';
                    document.getElementById('tags').value = recipe.tags || '';
                    document.getElementById('ingredients').value = recipe.ingredients;
                    document.getElementById('instructions').value = recipe.instructions;

                    const images = await getRecipeImages(recipeId);
                    if (images.length > 0) {
                        images.forEach(img => {
                            selectedImages.push({
                                id: img.id,
                                file: null,
                                url: img.r2_url,
                                isCover: img.is_cover
                            });
                        });
                        updateImagePreview();
                    }
                } catch (error) {
                    console.error('加载食谱失败:', error);
                    alert('加载失败，请刷新重试');
                }
            }
        }

        async function handleImageSelect(event) {
            if (!checkLogin()) return;
            
            const files = Array.from(event.target.files);
            const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            
            for (const file of files) {
                if (file.size > 5 * 1024 * 1024) {
                    alert(`文件 ${file.name} 超过5MB，请选择更小的文件`);
                    continue;
                }
                
                if (!allowedTypes.includes(file.type)) {
                    alert(`文件 ${file.name} 格式不支持，请选择 JPG、PNG、GIF 或 WebP 格式的图片`);
                    continue;
                }
                
                try {
                    const thumbnail = await generateThumbnail(file);
                    selectedImages.push({
                        file: file,
                        thumbnail: thumbnail,
                        url: URL.createObjectURL(file),
                        isCover: selectedImages.length === 0
                    });
                } catch (error) {
                    console.error('生成缩略图失败:', error);
                    selectedImages.push({
                        file: file,
                        thumbnail: null,
                        url: URL.createObjectURL(file),
                        isCover: selectedImages.length === 0
                    });
                }
            }

            updateImagePreview();
            event.target.value = '';
        }

        function updateImagePreview() {
            const preview = document.getElementById('imagePreview');
            
            if (selectedImages.length === 0) {
                preview.innerHTML = '<p class="no-images">暂无图片</p>';
                return;
            }

            preview.innerHTML = selectedImages.map((img, index) => `
                <div class="preview-item ${img.isCover ? 'cover' : ''}">
                    <img src="${img.url}" alt="预览图">
                    <div class="preview-actions">
                        ${img.isCover ? '<span class="cover-badge">封面</span>' : 
                            `<button type="button" onclick="setCover(${index})" class="btn btn-small">设为封面</button>`}
                        <button type="button" onclick="removeImage(${index})" class="btn btn-small btn-danger">删除</button>
                    </div>
                </div>
            `).join('');
        }

        async function setCover(index) {
            if (!checkLogin()) return;
            
            const img = selectedImages[index];
            
            if (img.id && editingRecipeId) {
                try {
                    const formData = new FormData();
                    formData.append('action', 'set_cover');
                    formData.append('imageId', img.id);

                    const response = await fetch(
                        `/api/recipes/${editingRecipeId}/images`,
                        {
                            method: 'POST',
                            body: formData
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`Set cover failed: ${response.status}`);
                    }
                    
                    selectedImages.forEach((img, i) => {
                        img.isCover = i === index;
                    });
                    updateImagePreview();
                } catch (error) {
                    console.error('设置封面失败:', error);
                    alert('设置封面失败，请重试');
                }
            } else {
                selectedImages.forEach((img, i) => {
                    img.isCover = i === index;
                });
                updateImagePreview();
            }
        }

        async function removeImage(index) {
            if (!checkLogin()) return;
            
            const img = selectedImages[index];
            
            if (img.id && editingRecipeId) {
                if (confirm('确定要删除这张图片吗？')) {
                    try {
                        await deleteRecipeImage(editingRecipeId, img.id);
                    } catch (error) {
                        console.error('删除图片失败:', error);
                        alert('删除图片失败，请重试');
                        return;
                    }
                } else {
                    return;
                }
            }
            
            selectedImages.splice(index, 1);
            if (selectedImages.length > 0 && !selectedImages.some(img => img.isCover)) {
                selectedImages[0].isCover = true;
            }
            updateImagePreview();
        }

        async function handleSubmit(event) {
            if (!checkLogin()) return;
            
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const recipeData = {
                title: formData.get('title'),
                description: formData.get('description'),
                cooking_time: formData.get('cooking_time') ? parseInt(formData.get('cooking_time')) : null,
                servings: formData.get('servings') ? parseInt(formData.get('servings')) : null,
                difficulty: formData.get('difficulty'),
                category: formData.get('category'),
                tags: formData.get('tags'),
                ingredients: formData.get('ingredients'),
                instructions: formData.get('instructions')
            };

            const submitBtn = event.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '保存中...';

            try {
                let recipeId;
                if (editingRecipeId) {
                    recipeId = await updateRecipeAPI(editingRecipeId, recipeData);
                } else {
                    recipeId = await createRecipeAPI(recipeData);
                }

                if (selectedImages.length > 0) {
                    const newImages = selectedImages.filter(img => img.file);
                    const totalImages = newImages.length;
                    
                    for (let i = 0; i < newImages.length; i++) {
                        const img = newImages[i];
                        const progress = (i / totalImages) * 100;
                        
                        await uploadRecipeImage(recipeId, img.file, img.isCover, img.thumbnail, (percent) => {
                            const currentProgress = progress + (percent / totalImages);
                            submitBtn.textContent = `上传中 ${Math.round(currentProgress)}%`;
                        });
                    }
                }

                submitBtn.textContent = '100%';
                setTimeout(() => {
                    alert('保存成功！');
                    window.location.href = `recipe-detail.html?id=${recipeId}`;
                }, 500);
            } catch (error) {
                console.error('保存失败:', error);
                // 显示具体的错误信息
                const errorMessage = error.message || '保存失败，请重试';
                alert(`保存失败：${errorMessage}`);
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 保存食谱';
            }
        }

        // 显示用户信息
        function showUserInfo() {
            const userInfoElement = document.getElementById('userInfo');
            const user = localStorage.getItem('recipe_user');
            
            if (user) {
                const userObj = JSON.parse(user);
                userInfoElement.innerHTML = `
                    <span class="username">👤 ${userObj.username}</span>
                    <button onclick="logout()" class="btn btn-secondary logout-btn">🚪 退出</button>
                `;
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('recipe_user');
            localStorage.removeItem('recipe_token');
            window.location.href = 'login.html';
        }

        // 加载分类列表
        async function loadCategories() {
            try {
                const categories = await getCategories();
                const categorySelect = document.getElementById('category');
                
                categorySelect.innerHTML = '<option value="">选择分类</option>';
                
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.name;
                    option.textContent = category.name;
                    categorySelect.appendChild(option);
                });
            } catch (error) {
                console.error('加载分类失败:', error);
                const categorySelect = document.getElementById('category');
                categorySelect.innerHTML = '<option value="">加载分类失败</option>';
            }
        }

        // 页面加载时检查登录状态
        window.onload = function() {
            if (checkLogin()) {
                showUserInfo();
                loadCategories();
                loadRecipeForEdit();
            }
        };
    </script>
</body>
</html>
