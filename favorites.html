<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 纸上滑雪的家庭食谱</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="recipe-styles.css">
    <style>
        /* 用户信息样式 */
        .main-nav {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .username {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .logout-btn {
            font-size: 12px;
            padding: 6px 12px;
        }

        .recipe-image {
            cursor: pointer;
            position: relative;
        }

        .recipe-image::after {
            content: '🔍 点击查看原图';
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .recipe-image:hover::after {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .main-nav {
                flex-wrap: wrap;
            }

            .user-info {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🚀 纸上滑雪的杂物间</h1>
            <p class="subtitle">高质量工具和软件下载平台</p>
            <nav class="main-nav">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="recipes.html" class="nav-link active">🍳 家庭食谱</a>
                <a href="nav.html" class="nav-link">🌐 网页导航</a>
                <div class="user-info" id="userInfo">
                    <!-- 登录后显示用户信息和退出按钮 -->
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="recipe-sub-nav">
            <a href="recipes.html" class="sub-nav-link">📖 食谱列表</a>
            <a href="create-recipe.html" class="sub-nav-link">➕ 创建食谱</a>
            <a href="favorites.html" class="sub-nav-link active">⭐ 我的收藏</a>
        </section>

        <section class="page-header">
            <h1>⭐ 我的收藏</h1>
            <p class="subtitle">收藏的美食食谱</p>
        </section>

        <section class="recipes-grid" id="favoritesGrid">
            <div class="loading">加载中...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 纸上滑雪的家庭食谱. All rights reserved.</p>
        </div>
    </footer>

    <script src="recipe-api.js"></script>
    <script>
        // 检查登录状态
        function checkLogin() {
            const user = localStorage.getItem('recipe_user');
            if (!user) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        async function loadFavorites() {
            if (!checkLogin()) return;
            
            const grid = document.getElementById('favoritesGrid');
            grid.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const favorites = await getFavorites();

                if (favorites.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⭐</div>
                            <p>暂无收藏</p>
                            <p>去食谱列表收藏一些喜欢的食谱吧！</p>
                            <a href="recipes.html" class="btn btn-primary">浏览食谱</a>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = favorites.map(favorite => `
                    <div class="recipe-card" onclick="viewRecipe(${favorite.id})">
                        <div class="recipe-image" onclick="event.stopPropagation(); viewOriginalImage('${favorite.original_image || favorite.cover_image}')">
                            ${favorite.cover_image ? 
                                `<img src="${favorite.cover_image}" alt="${favorite.title}" onerror="this.src='https://via.placeholder.com/400x300?text=暂无图片'">` :
                                `<div class="no-image">暂无图片</div>`
                            }
                            <div class="recipe-badge">${favorite.difficulty}</div>
                            <button onclick="event.stopPropagation(); removeFavorite(${favorite.id})" class="btn btn-remove-favorite">
                                ✕
                            </button>
                        </div>
                        <div class="recipe-info">
                            <h3 class="recipe-title">${favorite.title}</h3>
                            <p class="recipe-description">${favorite.description || '暂无描述'}</p>
                            <div class="recipe-meta">
                                <span class="meta-item">⏱️ ${favorite.cooking_time || '未知'}分钟</span>
                                <span class="meta-item">👥 ${favorite.servings || '未知'}人份</span>
                            </div>
                            <div class="recipe-tags">
                                ${favorite.tags ? favorite.tags.split(',').map(tag => 
                                    `<span class="tag">${tag.trim()}</span>`
                                ).join('') : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载收藏失败:', error);
                grid.innerHTML = '<div class="error">加载失败，请刷新重试</div>';
            }
        }

        function viewRecipe(id) {
            if (!checkLogin()) return;
            window.location.href = `recipe-detail.html?id=${id}`;
        }

        function viewOriginalImage(url) {
            if (!checkLogin()) return;
            if (url) {
                window.open(url, '_blank');
            }
        }

        async function removeFavorite(recipeId) {
            if (!checkLogin()) return;
            
            if (confirm('确定要取消收藏这个食谱吗？')) {
                try {
                    await removeFavoriteAPI(recipeId);
                    alert('已取消收藏');
                    loadFavorites();
                } catch (error) {
                    console.error('取消收藏失败:', error);
                    alert('操作失败，请重试');
                }
            }
        }

        // 显示用户信息
        function showUserInfo() {
            const userInfoElement = document.getElementById('userInfo');
            const user = localStorage.getItem('recipe_user');
            
            if (user) {
                const userObj = JSON.parse(user);
                userInfoElement.innerHTML = `
                    <span class="username">👤 ${userObj.username}</span>
                    <button onclick="logout()" class="btn btn-secondary logout-btn">🚪 退出</button>
                `;
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('recipe_user');
            localStorage.removeItem('recipe_token');
            window.location.href = 'login.html';
        }

        // 页面加载时检查登录状态
        window.onload = function() {
            if (checkLogin()) {
                showUserInfo();
                loadFavorites();
            }
        };
    </script>
</body>
</html>
